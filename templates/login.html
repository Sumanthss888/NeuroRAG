<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <!-- Theme Initialization Script (FOIS Prevention) -->
    <script>
        (function() {
            const mode = localStorage.getItem('neurorag_theme_mode') || 'patient';
            document.documentElement.setAttribute('data-mode', mode);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroRAG - Secure Clinical Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'sans-serif'],
              display: ['DM Sans', '-apple-system', 'sans-serif'],
            },
            colors: {
              glass: 'rgba(255, 255, 255, 0.04)',
              'glass-elevated': 'rgba(255, 255, 255, 0.07)',
              'glass-subtle': 'rgba(255, 255, 255, 0.02)',
              accent: {
                DEFAULT: 'var(--color-accent)',
                dim: 'var(--color-accent-dim)',
              },
              bg: {
                base: '#08090A',
                surface: '#0F1011',
                elevated: '#161718',
              },
              border: {
                DEFAULT: 'rgba(255, 255, 255, 0.08)',
                strong: 'rgba(255, 255, 255, 0.15)',
              },
              text: {
                primary: '#F2F2F2',
                secondary: 'rgba(242, 242, 242, 0.55)',
                muted: 'rgba(242, 242, 242, 0.30)',
              }
            },
            borderRadius: {
              'sm': '12px',
              'md': '16px',
              'lg': '20px',
              'xl': '24px',
              '2xl': '20px',
              '3xl': '24px',
            },
            boxShadow: {
              'soft': '0 8px 30px rgba(0, 0, 0, 0.25)',
              'medium': '0 12px 40px rgba(0, 0, 0, 0.35)',
              'glow': '0 0 40px var(--color-accent-glow)',
            }
          }
        }
      }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#08090A] text-slate-200 font-sans min-h-screen w-full flex flex-col">
    <!-- FIX: Visual Redesign - split-screen minimal layout with flat base backgrounds, simple text tabs, and borderless inputs -->
    <div class="auth-fade-in flex flex-col min-[900px]:flex-row w-full min-h-screen">
        <!-- Left Column: Editorial Brand context (hidden on mobile <900px) -->
        <div class="hidden min-[900px]:flex min-[900px]:w-[55%] flex-col justify-between p-16 border-r border-border bg-[#08090A] min-h-screen select-none">
            <!-- Top Left: Subtle logo -->
            <div class="flex items-center gap-2">
                <svg class="w-7 h-7 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                    <path d="M12 5v13" />
                </svg>
            </div>
            
            <!-- Content Block -->
            <div class="flex-1 flex flex-col justify-center max-w-[420px] pr-8">
                <h2 class="font-display text-[22px] font-medium text-white mb-2 leading-tight">NeuroRAG</h2>
                <p class="text-text-secondary text-sm leading-relaxed font-medium">
                    A clinical reference assistant for the 51-chapter neurology handbook.
                </p>
            </div>
            
            <!-- Bottom spacing dummy -->
            <div></div>
        </div>

        <!-- Right Column: Form container -->
        <div class="flex-1 flex flex-col justify-center bg-[#08090A] min-h-screen p-8 min-[900px]:p-16">
            <!-- Mobile Header (visible only on <900px) -->
            <div class="flex flex-col items-start gap-4 mb-10 min-[900px]:hidden">
                <div class="flex items-center gap-2">
                    <svg class="w-6 h-6 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                        <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                        <path d="M12 5v13" />
                    </svg>
                    <span class="font-display text-lg font-medium text-white">NeuroRAG</span>
                </div>
            </div>

            <!-- Main Auth Content -->
            <div class="w-full max-w-[420px] mx-auto min-[900px]:mx-0">
                <!-- Text tab navigation (Sign in / Create account) -->
                <div class="flex items-center gap-6 mb-8 border-b border-border pb-3">
                    <a href="/login" class="text-sm font-semibold tracking-wide border-b-2 pb-3 -mb-[13px] border-accent text-accent">Sign in</a>
                    <a href="/signup" class="text-sm font-medium tracking-wide text-text-secondary hover:text-white pb-3 -mb-[13px]">Create account</a>
                </div>

                <!-- Alert box -->
                <div id="message" class="hidden mb-6 rounded-lg p-4 text-sm font-medium border auth-fade-in bg-red-500/10 border-red-500/30 text-red-400"></div>

                <!-- Credentials Form -->
                <form id="loginForm" class="space-y-6">
                    <!-- Username Field -->
                    <div class="space-y-2">
                        <label for="username" class="text-[13px] font-medium text-text-secondary block">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            required 
                            placeholder="Enter your username" 
                            autocomplete="off"
                            class="auth-input"
                        >
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2">
                        <label for="password" class="text-[13px] font-medium text-text-secondary block">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            required 
                            placeholder="Enter your password" 
                            class="auth-input"
                        >
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-2">
                        <button 
                            type="submit" 
                            id="loginBtn" 
                            class="auth-btn relative"
                        >
                            <span id="btnText" class="flex items-center justify-center gap-2">Sign in</span>
                            <div id="spinner" class="hidden absolute">
                                <i class="ph-bold ph-spinner animate-spin text-xl"></i>
                            </div>
                        </button>
                    </div>
                </form>

                <!-- Footer Disclaimer -->
                <div class="mt-12 pt-6 border-t border-border/40">
                    <p class="text-[12px] text-text-muted leading-relaxed font-medium">
                        Simulated clinical workspace. Verify medical data independently.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Keep exact JS logic untouched -->
    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            
            // Apply Tailwind classes dynamically based on type
            if (type === 'success') {
                messageDiv.className = 'mb-6 rounded-lg p-4 text-sm font-medium border auth-fade-in bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
            } else {
                messageDiv.className = 'mb-6 rounded-lg p-4 text-sm font-medium border auth-fade-in bg-red-500/10 border-red-500/30 text-red-400';
            }
            
            messageDiv.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            loginBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('invisible');
                spinner.classList.remove('hidden');
            } else {
                btnText.classList.remove('invisible');
                spinner.classList.add('hidden');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            setLoading(true);
            messageDiv.classList.add('hidden');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Access granted. Initializing dashboard...', 'success');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showMessage(data.message || 'Access denied', 'error');
                    setLoading(false);
                }
            } catch (error) {
                showMessage('Connection error. Server offline.', 'error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
