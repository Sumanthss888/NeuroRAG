<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <!-- Theme Initialization Script (FOIS Prevention) -->
    <script>
        (function() {
            const mode = localStorage.getItem('neurorag_theme_mode') || 'patient';
            document.documentElement.setAttribute('data-mode', mode);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroRAG - Initialize Personnel</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'sans-serif'],
              display: ['DM Sans', '-apple-system', 'sans-serif'],
            },
            colors: {
              glass: 'rgba(255, 255, 255, 0.04)',
              'glass-elevated': 'rgba(255, 255, 255, 0.07)',
              'glass-subtle': 'rgba(255, 255, 255, 0.02)',
              accent: {
                DEFAULT: 'var(--color-accent)',
                dim: 'var(--color-accent-dim)',
              },
              bg: {
                base: '#08090A',
                surface: '#0F1011',
                elevated: '#161718',
              },
              border: {
                DEFAULT: 'rgba(255, 255, 255, 0.08)',
                strong: 'rgba(255, 255, 255, 0.15)',
              },
              text: {
                primary: '#F2F2F2',
                secondary: 'rgba(242, 242, 242, 0.55)',
                muted: 'rgba(242, 242, 242, 0.30)',
              }
            },
            borderRadius: {
              'sm': '12px',
              'md': '16px',
              'lg': '20px',
              'xl': '24px',
              '2xl': '20px',
              '3xl': '24px',
            },
            boxShadow: {
              'soft': '0 8px 30px rgba(0, 0, 0, 0.25)',
              'medium': '0 12px 40px rgba(0, 0, 0, 0.35)',
              'glow': '0 0 40px var(--color-accent-glow)',
            }
          }
        }
      }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="relative flex min-h-screen items-center justify-center bg-bg-base text-slate-200 overflow-hidden">
    
    <!-- Ambient Neural Background -->
    <div id="neural-bg">
        <div class="orb-indigo"></div>
    </div>
    <div class="noise-overlay"></div>

    <!-- Main Glass Card (Screen 1 specifications) -->
    <div class="glass-elevated w-[420px] rounded-[40px] p-10 shadow-medium animate-in relative z-10 border border-border mx-4 mt-8 mb-8">
        
        <!-- Brand Block -->
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-accent/10 border border-accent/20 shadow-glow">
                <!-- Monoline brain SVG outline logo -->
                <svg class="w-10 h-10 text-accent animate-pulse-glow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
                    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
                    <path d="M12 5v13" />
                </svg>
            </div>
            <h1 class="font-display text-2xl font-bold tracking-tight text-white mb-2">Initialize Profile</h1>
            <p class="text-[12px] text-text-muted font-medium tracking-wide">Create your clinical credentials</p>
        </div>

        <!-- Authentication Tabs (Pill Switcher) -->
        <div class="relative flex bg-glass-subtle p-1 rounded-xl border border-border w-full overflow-hidden shadow-inner mb-6">
            <a href="/login" class="flex-1 py-2 rounded-lg flex items-center justify-center font-display text-[13px] font-medium transition-all duration-300 text-text-secondary hover:text-white">
                <span>Login</span>
            </a>
            <a href="/signup" class="flex-1 py-2 rounded-lg flex items-center justify-center font-display text-[13px] font-semibold transition-all duration-300 bg-white/10 text-white shadow-sm border border-white/5">
                <span>Signup</span>
            </a>
        </div>

        <div id="message" class="hidden mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md"></div>

        <form id="signupForm" class="space-y-5">
            <!-- Username Input -->
            <div class="space-y-1">
                <label for="username" class="text-[11px] font-bold text-text-muted uppercase tracking-wider block">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    required 
                    placeholder="Create a username" 
                    autocomplete="off"
                    class="w-full bg-transparent border-b border-border h-12 text-[15px] font-sans text-text-primary placeholder-text-muted focus:border-accent focus:shadow-[0_4px_12px_rgba(var(--color-accent-rgb),0.08)] outline-none transition-all duration-300 px-1"
                >
            </div>

            <!-- Email Input -->
            <div class="space-y-1">
                <label for="email" class="text-[11px] font-bold text-text-muted uppercase tracking-wider block">Email (Optional)</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email" 
                    autocomplete="off"
                    class="w-full bg-transparent border-b border-border h-12 text-[15px] font-sans text-text-primary placeholder-text-muted focus:border-accent focus:shadow-[0_4px_12px_rgba(var(--color-accent-rgb),0.08)] outline-none transition-all duration-300 px-1"
                >
            </div>

            <!-- Password Input -->
            <div class="space-y-1">
                <label for="password" class="text-[11px] font-bold text-text-muted uppercase tracking-wider block">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    placeholder="Create a secure password" 
                    class="w-full bg-transparent border-b border-border h-12 text-[15px] font-sans text-text-primary placeholder-text-muted focus:border-accent focus:shadow-[0_4px_12px_rgba(var(--color-accent-rgb),0.08)] outline-none transition-all duration-300 px-1"
                >
            </div>

            <!-- Confirm Password Input -->
            <div class="space-y-1">
                <label for="confirm-password" class="text-[11px] font-bold text-text-muted uppercase tracking-wider block">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    required 
                    placeholder="Re-enter password" 
                    class="w-full bg-transparent border-b border-border h-12 text-[15px] font-sans text-text-primary placeholder-text-muted focus:border-accent focus:shadow-[0_4px_12px_rgba(var(--color-accent-rgb),0.08)] outline-none transition-all duration-300 px-1"
                >
            </div>

            <!-- Submit Button (Phase 2 primary button specifications) -->
            <button 
                type="submit" 
                id="signupBtn" 
                class="group relative w-full h-12 flex items-center justify-center rounded-xl bg-accent px-4 font-sans text-[15px] font-medium text-white shadow-soft transition-all duration-200 hover:brightness-110 hover:-translate-y-[1px] active:scale-95 disabled:opacity-70 disabled:hover:scale-100 mt-2"
            >
                <div class="absolute inset-0 bg-white/10 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
                
                <span id="btnText" class="flex items-center justify-center gap-2">
                    Initialize Profile <i class="ph-bold ph-check-circle transition-transform group-hover:scale-110"></i>
                </span>
                
                <div id="spinner" class="hidden absolute">
                    <i class="ph-bold ph-spinner animate-spin text-xl"></i>
                </div>
            </button>
        </form>
    </div>

    <!-- Keep exact JS logic untouched -->
    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const signupBtn = document.getElementById('signupBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            
            if (type === 'success') {
                messageDiv.className = 'mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
            } else {
                messageDiv.className = 'mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md bg-red-500/10 border-red-500/30 text-red-400';
            }
            
            messageDiv.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            signupBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('invisible');
                spinner.classList.remove('hidden');
            } else {
                btnText.classList.remove('invisible');
                spinner.classList.add('hidden');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validation
            if (!username || !password) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('Username must be at least 3 characters', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Security key mismatch. Passwords must match.', 'error');
                return;
            }

            setLoading(true);
            messageDiv.classList.add('hidden');

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Credentials generated! Routing to login portal...', 'success');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showMessage(data.message || 'Initialization failed', 'error');
                    setLoading(false);
                }
            } catch (error) {
                showMessage('Connection error. Core offline.', 'error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
