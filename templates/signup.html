<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroRAG - Initialize Personnel</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              glass: 'rgba(15, 23, 42, 0.6)',
            }
          }
        }
      }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="relative flex min-h-screen items-center justify-center bg-[#020617] text-slate-200 overflow-hidden">
    
    <!-- Ambient Background Effects -->
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    <div class="noise-overlay"></div>

    <!-- Main Glass Card -->
    <div class="glass-panel w-full max-w-md rounded-3xl p-8 shadow-[0_0_50px_rgba(6,182,212,0.15)] animate-slide-up relative z-10 border border-white/10 mx-4 mt-8 mb-8">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-emerald-500/10 border border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                <i class="ph-fill ph-user-plus text-4xl text-emerald-400 drop-shadow-[0_0_10px_rgba(16,185,129,0.8)]"></i>
            </div>
            <h1 class="font-display text-3xl font-bold tracking-tight text-white mb-2">Initialize Profile</h1>
            <p class="text-slate-400 font-medium">Create your clinical credentials</p>
        </div>

        <div id="message" class="hidden mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md"></div>

        <form id="signupForm" class="space-y-6">
            <!-- Username Input -->
            <div class="floating-input relative">
                <input 
                    type="text" 
                    id="username" 
                    required 
                    placeholder=" " 
                    autocomplete="off"
                    class="glass-input peer w-full rounded-xl px-4 py-4 text-base focus:ring-0 placeholder-transparent"
                >
                <label for="username" class="absolute left-4 top-4 text-slate-400 transition-all duration-200 peer-focus:-translate-y-3 peer-focus:text-xs peer-focus:text-emerald-400 peer-focus:font-semibold peer-valid:-translate-y-3 peer-valid:text-xs peer-valid:text-slate-300">
                    <div class="flex items-center gap-2"><i class="ph ph-identification-card"></i> Username</div>
                </label>
                <p class="mt-1.5 ml-2 text-xs text-slate-500"><i class="ph ph-info"></i> Minimum 3 characters required</p>
            </div>

            <!-- Email Input -->
            <div class="floating-input relative">
                <input 
                    type="email" 
                    id="email" 
                    placeholder=" " 
                    autocomplete="off"
                    class="glass-input peer w-full rounded-xl px-4 py-4 text-base focus:ring-0 placeholder-transparent"
                >
                <label for="email" class="absolute left-4 top-4 text-slate-400 transition-all duration-200 peer-focus:-translate-y-3 peer-focus:text-xs peer-focus:text-emerald-400 peer-focus:font-semibold peer-valid:-translate-y-3 peer-valid:text-xs peer-valid:text-slate-300">
                    <div class="flex items-center gap-2"><i class="ph ph-envelope-simple"></i> Email (Optional)</div>
                </label>
            </div>

            <!-- Password Input -->
            <div class="floating-input relative">
                <input 
                    type="password" 
                    id="password" 
                    required 
                    placeholder=" " 
                    class="glass-input peer w-full rounded-xl px-4 py-4 text-base focus:ring-0 placeholder-transparent"
                >
                <label for="password" class="absolute left-4 top-4 text-slate-400 transition-all duration-200 peer-focus:-translate-y-3 peer-focus:text-xs peer-focus:text-emerald-400 peer-focus:font-semibold peer-valid:-translate-y-3 peer-valid:text-xs peer-valid:text-slate-300">
                    <div class="flex items-center gap-2"><i class="ph ph-lock-key"></i> Password</div>
                </label>
                <p class="mt-1.5 ml-2 text-xs text-slate-500"><i class="ph ph-shield-check"></i> Minimum 6 characters required</p>
            </div>

            <!-- Confirm Password Input -->
            <div class="floating-input relative">
                <input 
                    type="password" 
                    id="confirm-password" 
                    required 
                    placeholder=" " 
                    class="glass-input peer w-full rounded-xl px-4 py-4 text-base focus:ring-0 placeholder-transparent"
                >
                <label for="confirm-password" class="absolute left-4 top-4 text-slate-400 transition-all duration-200 peer-focus:-translate-y-3 peer-focus:text-xs peer-focus:text-emerald-400 peer-focus:font-semibold peer-valid:-translate-y-3 peer-valid:text-xs peer-valid:text-slate-300">
                    <div class="flex items-center gap-2"><i class="ph ph-lock-key-fill"></i> Confirm Password</div>
                </label>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="signupBtn" 
                class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-emerald-600 to-teal-600 px-4 py-4 font-display text-base font-bold text-white shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] active:scale-95 disabled:opacity-70 disabled:hover:scale-100"
            >
                <div class="absolute inset-0 bg-white/20 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
                
                <span id="btnText" class="flex items-center justify-center gap-2">
                    Initialize Profile <i class="ph-bold ph-check-circle transition-transform group-hover:scale-110"></i>
                </span>
                
                <div id="spinner" class="hidden absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
                    <i class="ph-bold ph-spinner animate-spin text-xl"></i>
                </div>
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-slate-400 border-t border-white/10 pt-6">
            Existing personnel? 
            <a href="/login" class="font-semibold text-emerald-400 transition-colors hover:text-emerald-300 hover:drop-shadow-[0_0_8px_rgba(16,185,129,0.8)]">
                Authenticate here
            </a>
        </div>
    </div>

    <!-- Keep exact JS logic untouched -->
    <script>
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const signupBtn = document.getElementById('signupBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            
            if (type === 'success') {
                messageDiv.className = 'mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
            } else {
                messageDiv.className = 'mb-6 rounded-xl p-4 text-sm font-medium border animate-fade-in backdrop-blur-md bg-red-500/10 border-red-500/30 text-red-400';
            }
            
            messageDiv.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            signupBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('invisible');
                spinner.classList.remove('hidden');
            } else {
                btnText.classList.remove('invisible');
                spinner.classList.add('hidden');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validation
            if (!username || !password) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            if (username.length < 3) {
                showMessage('Username must be at least 3 characters', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Security key mismatch. Passwords must match.', 'error');
                return;
            }

            setLoading(true);
            messageDiv.classList.add('hidden');

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('Credentials generated! Routing to login portal...', 'success');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showMessage(data.message || 'Initialization failed', 'error');
                    setLoading(false);
                }
            } catch (error) {
                showMessage('Connection error. Core offline.', 'error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
